/* 大人のドキドキパック（17+ / 軽いスキンシップ中心の控えめなお題・トグルでON） */

const SPICY2 = [

  {e:"🎀", l:"膝の上10秒", d:"合意があれば10秒だけ誰かの膝の上へ（or 招く）。無理なら一気", t:"spicy2"},
  {e:"👑", l:"王様（プレミアム）", d:"飲み or 大人のスキンシップのお題を1つ命令（全員合意のもと・常識の範囲で）", t:"spicy2"},

/* ===== ライン超え枠：エロ系（18+・大胆だが露骨な性行為の指示は入れない／全員同意・却下可が大前提） ===== */
const ERO = [
  {e:"💋", l:"ディープキス", d:"合意があれば指名した相手と10秒キス。イヤなら即やめて一気で回避", t:"ero"},
  {e:"👕", l:"1枚脱ぐ", d:"上着・靴下など“外側の1枚”を脱ぐ（下着はNG）。無理なら一気", t:"ero"},
  {e:"🎀", l:"膝の上で1杯", d:"相手がOKなら膝の上に座って1杯。どちらか無理なら一気", t:"ero"},
  {e:"🫦", l:"耳もとに息", d:"合意の上で相手の耳もとに息をフーッ。イヤがられたら一気", t:"ero"},
  {e:"🤍", l:"ボディタッチ", d:"同意を得て“肩・腕・背中”に15秒タッチ。断られたら一気", t:"ero"},
  {e:"💃", l:"密着ダンス", d:"相手OKのとき限定で30秒、密着気味に踊る。棒立ちなら全員から一気指名", t:"ero"},
  {e:"🔥", l:"エロ告白", d:"“この中で一番ドキッとする人”を本人に指名して理由を告白。言えなきゃ一気", t:"ero"},
  {e:"🫂", l:"バックハグ30秒", d:"合意があれば後ろから30秒ハグ。無理なら半気×2", t:"ero"},
  {e:"👑", l:"エロ王様", d:"スキンシップ系のお題を1つ命令（全員合意・イヤがることは絶対NG）", t:"ero"},
  {e:"💌", l:"おねだり耳打ち", d:"隣の人の耳もとで“今されたいこと”をひとつ甘くおねだり", t:"ero"},
];

/* ===== ライン超え枠：飲酒系（ガチ飲み・ただし1枚=1杯まで／必ず水・ソフトで回避可・キツければ中断可） ===== */
const BOOZE = [
  {e:"🥃", l:"テキーラ1杯", d:"テキーラを1杯（塩＆ライム）。無理なら水・ソフトドリンクでOK", t:"booze"},
  {e:"🍺", l:"グラス一気", d:"自分のグラスを一気。しんどければ途中でやめてOK", t:"booze"},
  {e:"🍷", l:"好きな酒で乾杯", d:"飲みたいお酒を1杯選んで乾杯。飲めない人はソフトで", t:"booze"},
  {e:"👉", l:"道連れ1杯", d:"1人指名して一緒に1杯。相手が無理なら自分だけ、それも無理なら水", t:"booze"},
  {e:"🎯", l:"罰の1杯", d:"直前のお題を断った人がいれば、その人が1杯（or 水）", t:"booze"},
  {e:"🍻", l:"全員で乾杯", d:"その場の全員で1杯。体調優先、無理はソフトドリンクで", t:"booze"},
];

const ALL_CARDS = CARDS.concat(SPICY, SPICY2, ERO, BOOZE);

const TIER_LABEL  = { soft:"SAFE", mid:"NORMAL", hard:"HARD", chaos:"CHAOS", extreme:"YABASUGI", hell:"JIGOKU", spicy:"ADULT", spicy2:"ADULT+", ero:"EROS🔞", booze:"GACHI🥃" };
const TIER_WEIGHT = { soft:12, mid:12, hard:8, chaos:6, extreme:1, hell:1, spicy:8, spicy2:6, ero:8, booze:8 };
const TIER_INFO = [
  { t:"soft",    name:"😇 ゆるめ",       meta:"セーフ・ものまね・ダンスなど" },
  { t:"mid",     name:"🍺 ふつう",       meta:"半気・告白・お酌など" },
  { t:"hard",    name:"🥃 ガチ飲み",     meta:"一気・テキーラ・全員一気など" },
  { t:"chaos",   name:"🤪 カオス",       meta:"無言の刑・席替え・敬語の刑など" },
  { t:"extreme", name:"☠️ やばすぎ",     meta:"超低確率の鬼カード（出ると大惨事）" },
  { t:"hell",    name:"🌋 地獄級",       meta:"やばすぎのさらに上。極限の鬼カード（超低確率）" },
  { t:"spicy",   name:"💕 大人のドキドキ",   meta:"キス・ハグなど軽いスキンシップ系（17+）", adult:true, age:"17" },
  { t:"spicy2",  name:"🔥 大人のプレミアム", meta:"もっと大胆な大人のお題。上位互換（18+）", adult:true, age:"18" },
  // ライン超え枠（danger）
  { t:"ero",     name:"💋 エロ系",       meta:"ディープキス・密着など超きわどい大胆お題（18+）", adult:true, age:"18", danger:true },
  { t:"booze",   name:"🍾 飲酒系",       meta:"テキーラ・一気などガチ飲み（水・ソフトで回避OK）", danger:true, drink:true },
];

/* ===================== 設定の保存/読込 ===================== */
const DEFAULTS = { tiers:{soft:true,mid:true,hard:true,chaos:true,extreme:true,hell:true,spicy:false,spicy2:false,ero:false,booze:false} };
let settings = load('dg_settings', DEFAULTS);
// 旧バージョン互換（未定義キーは既定値で補完。大人パックは既定OFF）
for(const k in DEFAULTS.tiers) if(settings.tiers[k]===undefined) settings.tiers[k]=DEFAULTS.tiers[k];

function load(key, def){ try{ const v=localStorage.getItem(key); return v? JSON.parse(v): def; }catch(e){ return def; } }
function save(){ try{ localStorage.setItem('dg_settings', JSON.stringify(settings)); }catch(e){} }

/* ===================== 抽選プール ===================== */
function activePool(){
  let pool = ALL_CARDS.filter(c => settings.tiers[c.t]);
  if(pool.length===0) pool = CARDS.filter(c => c.t==='mid'); // 全OFF時の保険
  return pool;
}
function pickWeighted(pool){
  let total=0; for(const c of pool) total += (c.w || TIER_WEIGHT[c.t] || 1);
  let r=Math.random()*total;
  for(let i=0;i<pool.length;i++){ r -= (pool[i].w || TIER_WEIGHT[pool[i].t] || 1); if(r<=0) return i; }
  return pool.length-1;
}

/* ===================== 画面遷移 ===================== */
const screens = { home:byId('home'), game:byId('game'), settings:byId('settings') };
function show(name){
  for(const k in screens) screens[k].classList.toggle('active', k===name);
  if(name==='settings') renderSettings();
}
function byId(id){ return document.getElementById(id); }

byId('toGame').onclick     = ()=> show('game');
byId('toSettings').onclick = ()=> show('settings');
byId('gameBack').onclick   = ()=> show('home');
byId('setBack').onclick    = ()=> show('home');

/* ===================== ゲーム ===================== */
const card=byId('card'), emojiEl=byId('emoji'), labelEl=byId('label'), descEl=byId('desc'), tierEl=byId('tier');
const btn=byId('holdBtn'), hint=byId('hint');
let spinning=false, spinTimer=null, curPool=[], idx=0;

function vibrate(ms){ try{ navigator.vibrate && navigator.vibrate(ms); }catch(e){} }

function applyTier(t){
  tierEl.className='tier tier-'+t; tierEl.textContent=TIER_LABEL[t];
  const colors={ soft:'#3ddc97', mid:'#ffd23d', hard:'#ff3d7f', chaos:'#9b51e0', extreme:'#ff1744', hell:'#ff3d00', spicy:'#ff5fa2', spicy2:'#ff2d78', ero:'#ff1e6f', booze:'#b71c1c' };
  card.style.boxShadow=`0 18px 50px rgba(0,0,0,.55), inset 0 0 0 6px ${colors[t]||'#fff'}`;
  card.classList.toggle('extreme', t==='extreme'||t==='hell'||t==='booze');
  card.classList.toggle('spicy', t==='spicy'||t==='spicy2'||t==='ero');
}
function render(c){ emojiEl.textContent=c.e; labelEl.textContent=c.l; descEl.textContent=c.d; applyTier(c.t); }

function startSpin(){
  if(spinning) return;
  spinning=true; curPool=activePool();
  card.classList.remove('result'); card.classList.add('spinning'); hint.textContent=''; vibrate(10);
  let speed=45;
  const tick=()=>{ idx=(idx+1+Math.floor(Math.random()*3))%curPool.length; render(curPool[idx]); spinTimer=setTimeout(tick, speed); };
  tick();
}
function stopSpin(){
  if(!spinning) return; spinning=false; clearTimeout(spinTimer); card.classList.remove('spinning');
  const finalIdx = pickWeighted(curPool);
  let steps=6, delay=70;
  const slow=()=>{
    idx=(idx+1)%curPool.length; render(curPool[idx]); vibrate(12); steps--;
    if(steps>0){ delay+=35; setTimeout(slow, delay); }
    else{
      render(curPool[finalIdx]); card.classList.add('result');
      const c=curPool[finalIdx];
      vibrate(c.t==='extreme'||c.t==='hell'||c.t==='booze' ? [120,60,120,60,250] : c.t==='hard'||c.t==='chaos' ? [80,50,160] : c.t==='soft' ? 50 : [60,40,90]);
      hint.textContent = c.t==='hell' ? '地獄級…終わったな🌋' : c.t==='booze' ? '無理は禁物…水もアリだよ🥃' : c.t==='ero' ? '攻めすぎ注意…🔞 イヤなら却下OK' : c.t==='extreme' ? 'やばすぎ…ご愁傷さま☠️' : c.t==='spicy'||c.t==='spicy2' ? 'ドキドキ…💕' : c.t==='soft' ? 'ラッキー🎉' : c.t==='chaos' ? 'カオス…😈' : 'のんで〜🍺';
    }
  };
  slow();
}
function onDown(e){ e.preventDefault(); btn.classList.add('down'); startSpin(); }
function onUp(e){ e.preventDefault(); btn.classList.remove('down'); stopSpin(); }
btn.addEventListener('pointerdown', onDown);
btn.addEventListener('pointerup', onUp);
btn.addEventListener('pointerleave', e=>{ if(btn.classList.contains('down')) onUp(e); });
btn.addEventListener('pointercancel', onUp);
window.addEventListener('keydown', e=>{ if(e.code==='Space' && !e.repeat && screens.game.classList.contains('active')){ e.preventDefault(); btn.classList.add('down'); startSpin(); }});
window.addEventListener('keyup',   e=>{ if(e.code==='Space' && screens.game.classList.contains('active')){ e.preventDefault(); btn.classList.remove('down'); stopSpin(); }});
hint.textContent='長押しでスタート！';

/* ===================== 設定画面の描画 ===================== */
function renderSettings(){
  const rowHtml = info=>{
    const on = settings.tiers[info.t] ? 'checked':'';
    const badge = info.adult ? ` <span class="age-badge">${info.age}+</span>` : '';
    return `<div class="row${info.danger?' row-danger':''}"><div class="info"><div class="name">${info.name}${badge}</div><div class="meta">${info.meta}</div></div>
      <div class="sw"><input type="checkbox" id="t_${info.t}" ${on}><label for="t_${info.t}"></label></div></div>`;
  };
  // 通常ジャンル
  byId('tierRows').innerHTML = TIER_INFO.filter(i=>!i.danger).map(rowHtml).join('');
  // ライン超え枠（設定のいちばん下）
  const dangers = TIER_INFO.filter(i=>i.danger);
  byId('dangerSection').innerHTML =
    `<div class="sec-title danger-title">🔞 ライン超え（超危険・自己責任）</div>
     <div class="danger-note">
       <b>⚠️ 本当にやばい枠です。</b>過激なお題だけが入っています。ノリより安全を優先してください。<br>
       ・無理・イヤだと思ったお題は、<b>遠慮なく却下・パスしてOK</b>。断るのは全然アリです。<br>
       ・スキンシップ系は<b>相手の同意が絶対</b>。イヤがることは絶対にしない。<br>
       ・飲酒は20歳以上。<b>一気飲みは急性アルコール中毒の危険</b>。キツければ水・ソフトドリンクに切り替えを。<br>
       ・すべて自己責任で。体調・安全・全員の合意を最優先に。
     </div>` + dangers.map(rowHtml).join('');

  TIER_INFO.forEach(info=>{
    byId('t_'+info.t).onchange = e=>{
      // ライン超え枠：ONで強めの確認。断ったらトグルを戻す
      if(e.target.checked && info.danger){
        const msg = info.drink
          ? '【ライン超え・飲酒系】ガチ飲みのお題が入ります（1お題=1杯まで）。\n・あなたと参加者は20歳以上ですか？\n・一気飲みは急性アルコール中毒の危険があります。キツければ水・ソフトドリンクへ、イヤなお題は却下してOKです。\nそれでもONにしますか？'
          : '【ライン超え・エロ系】ディープキス・密着などかなり大胆な大人のお題が入ります。\n・あなたと参加者は18歳以上で、全員が合意していますか？\n・イヤなお題は却下してOK。相手がイヤがることは絶対にしないでください。\nそれでもONにしますか？';
        if(!confirm(msg)){ e.target.checked=false; return; }
        toast('ライン超え枠ON🔞 無理は絶対NG');
      } else if(e.target.checked && info.adult){
        // 大人向けパックは初回ONで年齢確認。断ったらトグルを戻す
        const ok = confirm(`「${info.name.replace(/^[^ ]+\s/, '')}」はキス・ハグなどのスキンシップ系お題を含みます（${info.age}歳以上向け）。\nあなたは${info.age}歳以上ですか？`);
        if(!ok){ e.target.checked=false; return; }
        toast('ONにしました💕');
      }
      settings.tiers[info.t]=e.target.checked; save();
    };
  });
}

/* ===================== トースト ===================== */
let toastTimer=null;
function toast(msg){
  const t=byId('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=> t.classList.remove('show'), 1800);
}
</script>
