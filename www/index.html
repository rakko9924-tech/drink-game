  {e:"💋", l:"ほっぺにキス", d:"右隣の人のほっぺにキス。恥ずかしければ一気で回避", t:"spicy"},
  {e:"👀", l:"見つめ合い", d:"気になる人と10秒間見つめ合う。笑ったら飲み", t:"spicy"},
  {e:"🫦", l:"耳元で囁き", d:"隣の人の耳元で名前を甘く囁く", t:"spicy"},
  {e:"😘", l:"投げキッス", d:"一番気になる人にセクシーに投げキッス", t:"spicy"},
  {e:"🤗", l:"10秒ハグ", d:"好きな人と10秒間ハグ。無理なら半気", t:"spicy"},
  {e:"💆", l:"肩もみ30秒", d:"隣の人の肩を30秒マッサージ", t:"spicy"},
  {e:"🫰", l:"お姫様抱っこ", d:"誰かをお姫様抱っこ（or されにいく）。無理なら一気", t:"spicy"},
  {e:"📸", l:"セクシーポーズ", d:"キメ顔でセクシーポーズを披露", t:"spicy"},
  {e:"💕", l:"隣に移動", d:"今一番ドキッとする人の隣に移動して1杯", t:"spicy"},
  {e:"🔥", l:"ドキドキ告白", d:"その場で一番タイプな人に“ときめきポイント”を伝える", t:"spicy"},
  {e:"👑", l:"王様（大人版）", d:"飲み or 軽いスキンシップのお題を1つ命令できる", t:"spicy"},
  {e:"💌", l:"褒め殺し", d:"右隣の人の魅力を30秒ほめ続ける。詰まったら飲み", t:"spicy"},
];

const TIER_LABEL  = { soft:"SAFE", mid:"NORMAL", hard:"HARD", chaos:"CHAOS", extreme:"YABASUGI", spicy:"ADULT" };
const TIER_WEIGHT = { soft:12, mid:12, hard:8, chaos:6, extreme:1, spicy:8 };
const TIER_INFO = [
  { t:"soft",    name:"😇 ゆるめ",       meta:"セーフ・ものまね・ダンスなど" },
  { t:"mid",     name:"🍺 ふつう",       meta:"半気・告白・お酌など" },
  { t:"hard",    name:"🥃 ガチ飲み",     meta:"一気・テキーラ・全員一気など" },
  { t:"chaos",   name:"🤪 カオス",       meta:"無言の刑・席替え・敬語の刑など" },
  { t:"extreme", name:"☠️ やばすぎ",     meta:"超低確率の鬼カード（出ると大惨事）" },
];

/* ===================== 設定の保存/読込 ===================== */
const SPICY_PRODUCT = 'drinkgame.spicy_pack';
const DEFAULTS = { tiers:{soft:true,mid:true,hard:true,chaos:true,extreme:true}, spicyEnabled:false };
let settings = load('dg_settings', DEFAULTS);
let spicyOwned = load('dg_spicy_owned', false);
// 旧バージョン互換
for(const k in DEFAULTS.tiers) if(settings.tiers[k]===undefined) settings.tiers[k]=true;

function load(key, def){ try{ const v=localStorage.getItem(key); return v? JSON.parse(v): def; }catch(e){ return def; } }
function save(){ try{ localStorage.setItem('dg_settings', JSON.stringify(settings)); localStorage.setItem('dg_spicy_owned', JSON.stringify(spicyOwned)); }catch(e){} }

/* ===================== 抽選プール ===================== */
function activePool(){
  let pool = CARDS.filter(c => settings.tiers[c.t]);
  if(spicyOwned && settings.spicyEnabled) pool = pool.concat(SPICY);
  if(pool.length===0) pool = CARDS.filter(c => c.t==='mid'); // 全OFF時の保険
  return pool;
}
function pickWeighted(pool){
  let total=0; for(const c of pool) total += (c.w || TIER_WEIGHT[c.t] || 1);
  let r=Math.random()*total;
  for(let i=0;i<pool.length;i++){ r -= (pool[i].w || TIER_WEIGHT[pool[i].t] || 1); if(r<=0) return i; }
  return pool.length-1;
}

/* ===================== 画面遷移 ===================== */
const screens = { home:byId('home'), game:byId('game'), settings:byId('settings') };
function show(name){
  for(const k in screens) screens[k].classList.toggle('active', k===name);
  if(name==='settings') renderSettings();
}
function byId(id){ return document.getElementById(id); }

byId('toGame').onclick     = ()=> show('game');
byId('toSettings').onclick = ()=> show('settings');
byId('gameBack').onclick   = ()=> show('home');
byId('setBack').onclick    = ()=> show('home');

/* ===================== ゲーム ===================== */
const card=byId('card'), emojiEl=byId('emoji'), labelEl=byId('label'), descEl=byId('desc'), tierEl=byId('tier');
const btn=byId('holdBtn'), hint=byId('hint');
let spinning=false, spinTimer=null, curPool=[], idx=0;

function vibrate(ms){ try{ navigator.vibrate && navigator.vibrate(ms); }catch(e){} }

function applyTier(t){
  tierEl.className='tier tier-'+t; tierEl.textContent=TIER_LABEL[t];
  const colors={ soft:'#3ddc97', mid:'#ffd23d', hard:'#ff3d7f', chaos:'#9b51e0', extreme:'#ff1744', spicy:'#ff5fa2' };
  card.style.boxShadow=`0 18px 50px rgba(0,0,0,.55), inset 0 0 0 6px ${colors[t]}`;
  card.classList.toggle('extreme', t==='extreme');
  card.classList.toggle('spicy', t==='spicy');
}
function render(c){ emojiEl.textContent=c.e; labelEl.textContent=c.l; descEl.textContent=c.d; applyTier(c.t); }

function startSpin(){
  if(spinning) return;
  spinning=true; curPool=activePool();
  card.classList.remove('result'); card.classList.add('spinning'); hint.textContent=''; vibrate(10);
  let speed=45;
  const tick=()=>{ idx=(idx+1+Math.floor(Math.random()*3))%curPool.length; render(curPool[idx]); spinTimer=setTimeout(tick, speed); };
  tick();
}
function stopSpin(){
  if(!spinning) return; spinning=false; clearTimeout(spinTimer); card.classList.remove('spinning');
  const finalIdx = pickWeighted(curPool);
  let steps=6, delay=70;
  const slow=()=>{
    idx=(idx+1)%curPool.length; render(curPool[idx]); vibrate(12); steps--;
    if(steps>0){ delay+=35; setTimeout(slow, delay); }
    else{
      render(curPool[finalIdx]); card.classList.add('result');
      const c=curPool[finalIdx];
      vibrate(c.t==='extreme' ? [120,60,120,60,250] : c.t==='hard'||c.t==='chaos' ? [80,50,160] : c.t==='soft' ? 50 : [60,40,90]);
      hint.textContent = c.t==='extreme' ? 'やばすぎ…ご愁傷さま☠️' : c.t==='spicy' ? 'ドキドキ…💕' : c.t==='soft' ? 'ラッキー🎉' : c.t==='chaos' ? 'カオス…😈' : 'のんで〜🍺';
    }
  };
  slow();
}
function onDown(e){ e.preventDefault(); btn.classList.add('down'); startSpin(); }
function onUp(e){ e.preventDefault(); btn.classList.remove('down'); stopSpin(); }
btn.addEventListener('pointerdown', onDown);
btn.addEventListener('pointerup', onUp);
btn.addEventListener('pointerleave', e=>{ if(btn.classList.contains('down')) onUp(e); });
btn.addEventListener('pointercancel', onUp);
window.addEventListener('keydown', e=>{ if(e.code==='Space' && !e.repeat && screens.game.classList.contains('active')){ e.preventDefault(); btn.classList.add('down'); startSpin(); }});
window.addEventListener('keyup',   e=>{ if(e.code==='Space' && screens.game.classList.contains('active')){ e.preventDefault(); btn.classList.remove('down'); stopSpin(); }});
hint.textContent='長押しでスタート！';

/* ===================== 設定画面の描画 ===================== */
function renderSettings(){
  // ジャンルトグル
  const rows = TIER_INFO.map(info=>{
    const on = settings.tiers[info.t] ? 'checked':'';
    return `<div class="row"><div class="info"><div class="name">${info.name}</div><div class="meta">${info.meta}</div></div>
      <div class="sw"><input type="checkbox" id="t_${info.t}" ${on}><label for="t_${info.t}"></label></div></div>`;
  }).join('');
  byId('tierRows').innerHTML = rows;
  TIER_INFO.forEach(info=>{
    byId('t_'+info.t).onchange = e=>{ settings.tiers[info.t]=e.target.checked; save(); };
  });

  // 課金パック
  const pack = byId('spicyPack');
  if(spicyOwned){
    pack.innerHTML = `<div class="owned-row">
        <div><h3>💕 大人のドキドキパック</h3><div class="lead" style="margin:0">解放済み — ゲームに混ぜるか選べます</div></div>
        <div class="sw"><input type="checkbox" id="spicyToggle" ${settings.spicyEnabled?'checked':''}><label for="spicyToggle"></label></div>
      </div>`;
    byId('spicyToggle').onchange = e=>{ settings.spicyEnabled=e.target.checked; save(); };
  }else{
    pack.innerHTML = `<h3>💕 大人のドキドキパック</h3>
      <div class="lead">キス・ハグ・見つめ合いなど、ちょっと大人な“ドキドキ系”お題を12枚追加。カップル・合コンで盛り上がる17+の追加パック。</div>
      <button class="price-btn" id="buyBtn">💕 解放する（17+）</button>`;
    byId('buyBtn').onclick = onUnlock;
  }
}

/* ===================== 解放（年齢確認で無料解放・17+） ===================== */
function onUnlock(){
  if(!confirm('「大人のドキドキパック」はキス・ハグなど軽いスキンシップ系のお題を含みます（17歳以上向け）。\nあなたは17歳以上ですか？')){ return; }
  spicyOwned=true; settings.spicyEnabled=true; save();
  toast('解放しました！💕'); renderSettings();
}

/* ===================== トースト ===================== */
let toastTimer=null;
function toast(msg){
  const t=byId('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=> t.classList.remove('show'), 1800);
}
</script>
</body>
</html>
